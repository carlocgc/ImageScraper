name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version
        id: version
        shell: pwsh
        run: |
          $version = (Get-Content VERSION -Raw).Trim()
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT

      - name: Generate Version.h
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $parts = $version -split '\.'
          $content = @"
          #pragma once

          // Auto-generated by CI from the VERSION file — do not edit manually.

          namespace ImageScraper
          {
              constexpr int VERSION_MAJOR = $($parts[0]);
              constexpr int VERSION_MINOR = $($parts[1]);
              constexpr int VERSION_PATCH = $($parts[2]);
              constexpr const char* VERSION_STRING = "$version";
          }
          "@
          New-Item -ItemType Directory -Force -Path "ImageScraper\include\version" | Out-Null
          $content | Set-Content "ImageScraper\include\version\Version.h"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release|x64
        run: msbuild ImageScraper.sln /p:Configuration=Release /p:Platform=x64 /m /nologo /verbosity:minimal

      - name: Run tests
        run: bin\ImageScraperTests\x64\Release\ImageScraperTests.exe

      - name: Package release
        id: package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $zip = "ImageScraper-v$version-x64.zip"
          Compress-Archive -Path "bin\ImageScraper\x64\Release\*" -DestinationPath $zip
          echo "ZIP=$zip" >> $env:GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.ZIP }}
          name: ImageScraper v${{ steps.version.outputs.VERSION }}
          generate_release_notes: true

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: debug-symbols-v${{ steps.version.outputs.VERSION }}
          path: bin\ImageScraper\x64\Release\*.pdb
          retention-days: 30
