name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version in vX.X.X format'
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read version from tag
        id: version
        shell: pwsh
        run: |
          if ("${{ github.ref }}" -like "refs/tags/*") {
            $tagName = "${{ github.ref_name }}"
          } else {
            $tagName = "${{ inputs.version }}"
          }

          if ($tagName -notmatch '^v(\d+)\.(\d+)\.(\d+)$') {
            throw "Release version must use vX.X.X format. Received: $tagName"
          }

          $version = $tagName.Substring(1)
          echo "VERSION=$version" >> $env:GITHUB_OUTPUT
          echo "VERSION_TAG=$tagName" >> $env:GITHUB_OUTPUT

      - name: Generate Version.h
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $parts = $version -split '\.'
          $content = @"
          #pragma once

          // Auto-generated by CI from the release tag - do not edit manually.

          namespace ImageScraper
          {
              constexpr int VERSION_MAJOR = $($parts[0]);
              constexpr int VERSION_MINOR = $($parts[1]);
              constexpr int VERSION_PATCH = $($parts[2]);
              constexpr const char* VERSION_STRING = "$version";
          }
          "@
          New-Item -ItemType Directory -Force -Path "ImageScraper\include\version" | Out-Null
          $content | Set-Content "ImageScraper\include\version\Version.h"

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Release|x64
        run: msbuild ImageScraper.sln /p:Configuration=Release /p:Platform=x64 /m /nologo /verbosity:minimal

      - name: Run tests
        run: bin\ImageScraperTests\x64\Release\ImageScraperTests.exe

      - name: Copy MSVC CRT DLLs
        shell: pwsh
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $crtDir = Get-ChildItem "$vsPath\VC\Redist\MSVC\*\x64\Microsoft.VC143.CRT" | Select-Object -First 1
          Copy-Item "$crtDir\msvcp140.dll"       "bin\ImageScraper\x64\Release\"
          Copy-Item "$crtDir\vcruntime140.dll"   "bin\ImageScraper\x64\Release\"
          Copy-Item "$crtDir\vcruntime140_1.dll" "bin\ImageScraper\x64\Release\"

      - name: Package release
        id: package
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $zip = "ImageScraper-v$version-x64.zip"
          $releaseDir = "bin\ImageScraper\x64\Release"
          $stagingDir = Join-Path $env:RUNNER_TEMP "ImageScraper-release"
          if (Test-Path $stagingDir) {
            Remove-Item $stagingDir -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
          $paths = Get-ChildItem $releaseDir -File |
            Where-Object { $_.Name -notin @("ImageScraper.pdb", "config.json", "imgui.ini") }
          Copy-Item $paths.FullName $stagingDir
          Copy-Item "LICENSE.txt" $stagingDir
          Copy-Item "THIRD_PARTY_LICENSES.md" $stagingDir
          Copy-Item "README.MD" $stagingDir
          Compress-Archive -Path "$stagingDir\*" -DestinationPath $zip
          echo "ZIP=$zip" >> $env:GITHUB_OUTPUT

      - name: Install Inno Setup
        shell: pwsh
        run: choco install innosetup --no-progress --yes

      - name: Build installer
        id: installer
        shell: pwsh
        run: |
          $version = "${{ steps.version.outputs.VERSION }}"
          $sourceDir = (Resolve-Path "bin\ImageScraper\x64\Release").ProviderPath
          $rootDir = (Resolve-Path ".").ProviderPath
          $outputDir = Join-Path $PWD "dist"
          New-Item -ItemType Directory -Force -Path $outputDir | Out-Null
          $iscc = "${env:ProgramFiles(x86)}\Inno Setup 6\ISCC.exe"
          if (-not (Test-Path $iscc)) {
            throw "ISCC.exe was not found after installing Inno Setup."
          }
          & $iscc "installer\ImageScraper.iss" "/DAppVersion=$version" "/DSourceDir=$sourceDir" "/DOutputDir=$outputDir" "/DRootDir=$rootDir"
          $installer = Join-Path $outputDir "ImageScraper-v$version-x64-setup.exe"
          if (-not (Test-Path $installer)) {
            throw "Installer was not created at $installer."
          }
          echo "INSTALLER=$installer" >> $env:GITHUB_OUTPUT

      - name: Create checksums
        id: checksums
        shell: pwsh
        run: |
          $checksumFile = "SHA256SUMS.txt"
          $files = @(
            "${{ steps.package.outputs.ZIP }}",
            "${{ steps.installer.outputs.INSTALLER }}"
          )
          Get-FileHash -Algorithm SHA256 $files |
            ForEach-Object { "$($_.Hash.ToLowerInvariant())  $([IO.Path]::GetFileName($_.Path))" } |
            Set-Content $checksumFile
          echo "CHECKSUMS=$checksumFile" >> $env:GITHUB_OUTPUT

      - name: Upload installer artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-v${{ steps.version.outputs.VERSION }}
          path: |
            ${{ steps.package.outputs.ZIP }}
            ${{ steps.installer.outputs.INSTALLER }}
            ${{ steps.checksums.outputs.CHECKSUMS }}
          retention-days: 30

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ steps.package.outputs.ZIP }}
            ${{ steps.installer.outputs.INSTALLER }}
            ${{ steps.checksums.outputs.CHECKSUMS }}
          name: ImageScraper ${{ steps.version.outputs.VERSION_TAG }}
          generate_release_notes: true

      - name: Upload debug symbols
        uses: actions/upload-artifact@v4
        with:
          name: debug-symbols-v${{ steps.version.outputs.VERSION }}
          path: bin\ImageScraper\x64\Release\*.pdb
          retention-days: 30
