name: CI

on:
  push:
    branches: [development]
  pull_request:
    branches: [development]

permissions:
  contents: read
  checks: write

jobs:
  build-and-test:
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Build Debug|x64
        run: msbuild ImageScraper.sln /p:Configuration=Debug /p:Platform=x64 /m /nologo /verbosity:minimal

      - name: Run native Visual Studio tests
        timeout-minutes: 5
        shell: pwsh
        run: |
          $vsPath = & "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe" -latest -property installationPath
          $vstest = Join-Path $vsPath 'Common7\IDE\CommonExtensions\Microsoft\TestWindow\vstest.console.exe'
          & $vstest "bin\ImageScraperTests\x64\Debug\ImageScraperTests.dll" /Platform:x64 /Logger:"trx;LogFileName=ImageScraperTests.trx"

      - name: Publish test results
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Native CppUnitTest Tests
          path: TestResults/*.trx
          reporter: dotnet-trx
          path-replace-backslashes: 'true'

      - name: Upload debug binaries on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: debug-test-binaries
          path: |
            bin\ImageScraperTests\x64\Debug\ImageScraperTests.dll
            bin\ImageScraperTests\x64\Debug\libcurl-d.dll
          retention-days: 7
