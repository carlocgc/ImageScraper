<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Authorization Complete — ImageScraper</title>
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
            background-color: #0d0d0d;
            color: #e0e0e0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            gap: 16px;
        }

        .icon {
            width: 56px;
            height: 56px;
            border-radius: 50%;
            background-color: {{BRAND_COLOR}};
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            line-height: 1;
            color: #fff;
        }

        h1 {
            font-size: 22px;
            font-weight: 600;
            color: #fff;
            letter-spacing: -0.3px;
        }

        p {
            font-size: 14px;
            color: #888;
            text-align: center;
            max-width: 320px;
            line-height: 1.6;
        }

        .divider {
            width: 40px;
            height: 2px;
            background-color: {{BRAND_COLOR}};
            border-radius: 1px;
        }
    </style>
</head>
<body>
    <div class="icon">&#x2713;</div>
    <h1>Signed in to {{SERVICE_NAME}}</h1>
    <div class="divider"></div>
    <p>You can close this tab and return to ImageScraper.</p>
</body>
</html>
